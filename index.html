<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12.3 Voice Archive - 시민 팩트체크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .neo-shadow { shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]; }
        .neo-shadow-hover:hover { transform: translate(2px, 2px); box-shadow: none; }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-900 selection:bg-red-200">
    <div id="app">
        <!-- Navigation -->
        <nav class="bg-white border-b-2 border-black sticky top-0 z-30 h-20 flex items-center px-6">
            <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
                <div class="flex items-center cursor-pointer" onclick="showView('home')">
                    <div class="bg-red-600 text-white p-2 mr-3 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <i class="fas fa-balance-scale fa-lg"></i>
                    </div>
                    <span class="font-black text-2xl tracking-tighter uppercase italic">12.3 Voice Archive</span>
                </div>
                <button onclick="toggleAdminView()" id="adminBtn" class="text-xs font-black uppercase border-2 border-black px-4 py-2 hover:bg-black hover:text-white transition-all">
                    Admin Login
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6 py-12">
            <!-- Home View -->
            <div id="homeView" class="space-y-16">
                <div class="max-w-3xl space-y-6">
                    <h1 class="text-5xl md:text-6xl font-black leading-[1.1] break-keep">
                        현장의 <span class="text-red-600">거짓</span>을 <br>우리의 <span class="underline decoration-8 underline-offset-4">논리</span>로 기록합니다.
                    </h1>
                    <p class="text-lg text-slate-600 font-medium">현재 <span id="recordCount" class="font-black text-black">0</span>개의 시민 기록이 보호받고 있습니다.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-5 gap-12">
                    <div class="lg:col-span-3 bg-white border-4 border-black p-8 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] space-y-8">
                        <h2 class="text-2xl font-black flex items-center italic border-b-2 pb-4 text-slate-800">
                            <i class="fas fa-bolt mr-2 text-yellow-500"></i> 실시간 제보
                        </h2>
                        <div class="space-y-6">
                            <textarea id="propagandaInput" required placeholder="목격한 선동 논리 (예: 계엄은 불가피했다 등)"
                                class="w-full border-2 border-slate-200 p-4 h-24 focus:border-black outline-none font-bold bg-orange-50/30 transition-all"></textarea>
                            <textarea id="refuteInput" required placeholder="시민의 헌법적 반박 내용을 적어주세요."
                                class="w-full border-2 border-slate-200 p-4 h-40 focus:border-black outline-none font-medium transition-all"></textarea>
                            <div class="grid grid-cols-2 gap-4">
                                <input id="authorInput" required placeholder="닉네임"
                                    class="border-2 border-black p-4 font-bold outline-none">
                                <button onclick="submitData()" class="bg-red-600 text-white font-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all">전송하기</button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="bg-slate-900 text-white p-8 border-t-8 border-red-600 shadow-[8px_8px_0px_0px_rgba(0,0,0,0.1)]">
                            <h3 class="text-xl font-black italic mb-6 border-b border-white/20 pb-4">쟁점 퀴즈</h3>
                            <div id="quizContainer" class="space-y-4">
                                <!-- Quiz Content Injected Here -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-8 pt-8 border-t-4 border-black">
                    <h2 class="text-3xl font-black uppercase italic">Live Feed</h2>
                    <div id="liveFeed" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Feed Items Injected Here -->
                    </div>
                </div>
            </div>

            <!-- Admin Login View -->
            <div id="adminLoginView" class="hidden max-w-md mx-auto mt-20 p-12 bg-white border-4 border-black shadow-[16px_16px_0px_0px_rgba(0,0,0,1)] text-center">
                <i class="fas fa-shield-halved fa-4x mb-6"></i>
                <h2 class="text-3xl font-black uppercase tracking-tighter italic mb-8">System Access</h2>
                <div class="space-y-6">
                    <input type="password" id="adminPw" placeholder="Enter Passcode" 
                        class="w-full border-2 border-black p-4 rounded-none text-center font-mono text-xl outline-none">
                    <button onclick="checkAdminLogin()" class="w-full bg-black text-white py-5 font-black text-xl uppercase tracking-widest hover:bg-red-600 transition-colors">Confirm Identity</button>
                    <button onclick="showView('home')" class="text-slate-400 font-bold uppercase text-xs">Cancel</button>
                </div>
            </div>

            <!-- Admin Dashboard View -->
            <div id="adminDashboardView" class="hidden space-y-12">
                <h2 class="text-4xl font-black uppercase italic border-b-4 border-black pb-8 flex items-center">
                    <i class="fas fa-database mr-3"></i> Record Manager
                </h2>
                <div id="adminList" class="grid grid-cols-1 gap-6">
                    <!-- Admin Items Injected Here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, updateDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD97TrV1AUhfbrqyrl7z2EEtCzMSNke8mA",
            authDomain: "factcheck-archive.firebaseapp.com",
            projectId: "123-factcheck-archive",
            storageBucket: "123-factcheck-archive.firebasestorage.app",
            messagingSenderId: "730619394885",
            appId: "1:730619394885:web:09651d598ce29095749c2c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = '123-factcheck-archive';

        let userUid = null;
        let records = [];

        // Auth
        signInAnonymously(auth).then(res => userUid = res.user.uid);

        // UI State Switcher
        window.showView = (viewName) => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('adminLoginView').classList.add('hidden');
            document.getElementById('adminDashboardView').classList.add('hidden');
            document.getElementById(viewName + 'View').classList.remove('hidden');
            
            const adminBtn = document.getElementById('adminBtn');
            adminBtn.innerText = (viewName === 'adminDashboard') ? "Exit Admin" : "Admin Login";
        };

        window.toggleAdminView = () => {
            const isDashboard = !document.getElementById('adminDashboardView').classList.contains('hidden');
            showView(isDashboard ? 'home' : 'adminLogin');
        };

        // Data Fetching
        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'refutes'));
        onSnapshot(q, (snapshot) => {
            records = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
            renderUI();
        });

        // Submit Data
        window.submitData = async () => {
            const propaganda = document.getElementById('propagandaInput').value;
            const refute = document.getElementById('refuteInput').value;
            const author = document.getElementById('authorInput').value;

            if(!propaganda || !refute || !author) return alert("모든 칸을 채워주세요.");

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'refutes'), {
                    author, propaganda, refute,
                    status: '검토 중',
                    createdAt: serverTimestamp(),
                    userId: userUid
                });
                document.getElementById('propagandaInput').value = "";
                document.getElementById('refuteInput').value = "";
                document.getElementById('authorInput').value = "";
                alert("기록이 클라우드에 전송되었습니다.");
            } catch(e) { console.error(e); }
        };

        // Admin Login Logic
        window.checkAdminLogin = async () => {
            const pw = document.getElementById('adminPw').value;
            try {
                const configSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'settings', 'admin'));
                const correctPw = configSnap.exists() ? configSnap.data().password : "!factcheck123";
                
                if(pw === correctPw) {
                    showView('adminDashboard');
                } else {
                    alert("비밀번호가 틀렸습니다.");
                }
            } catch(e) { alert("연결 오류"); }
        };

        // Admin Action
        window.updateStatus = async (id, status) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'refutes', id), { status });
        };

        // UI Rendering
        function renderUI() {
            document.getElementById('recordCount').innerText = records.length;
            
            // Render Live Feed
            const feed = document.getElementById('liveFeed');
            feed.innerHTML = records.map(r => `
                <div class="bg-white border-2 border-black p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase bg-slate-100 px-2 py-1">${r.createdAt?.toDate().toLocaleDateString() || 'Just now'}</span>
                        <span class="text-[10px] font-black uppercase text-red-600">${r.status}</span>
                    </div>
                    <div class="space-y-4">
                        <p class="font-bold text-slate-900 italic">"${r.propaganda}"</p>
                        <p class="text-sm font-medium text-slate-700">${r.refute}</p>
                        <p class="text-[10px] font-black text-slate-400 text-right uppercase border-t pt-3">— BY ${r.author}</p>
                    </div>
                </div>
            `).join('');

            // Render Admin Dashboard
            const adminList = document.getElementById('adminList');
            adminList.innerHTML = records.map(r => `
                <div class="bg-white border-2 border-black p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-black italic">${r.author}</h3>
                        <div class="flex gap-2">
                            <button onclick="updateStatus('${r.id}', '승인')" class="px-4 py-1 text-xs font-black uppercase border-2 border-black ${r.status === '승인' ? 'bg-black text-white' : ''}">승인</button>
                            <button onclick="updateStatus('${r.id}', '보류')" class="px-4 py-1 text-xs font-black uppercase border-2 border-black ${r.status === '보류' ? 'bg-red-600 text-white border-red-600' : ''}">보류</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <p class="p-4 bg-orange-50 border-l-4 border-orange-500 text-sm font-bold italic">"${r.propaganda}"</p>
                        <p class="p-4 bg-blue-50 border-l-4 border-blue-500 text-sm">${r.refute}</p>
                    </div>
                </div>
            `).join('');
        }

        // Quiz Logic
        const quiz = [
            { q: "포고령이 헌법보다 우선하나요?", a: "아니요. 헌법 제77조에 따라 국회의 해제 요구는 즉각 수용되어야 합니다." }
        ];
        document.getElementById('quizContainer').innerHTML = quiz.map(i => `
            <div class="p-4 border border-white/20">
                <p class="font-bold mb-2">${i.q}</p>
                <p class="text-sm text-slate-400 italic">${i.a}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
