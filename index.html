<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12.3 Voice Archive - 시민 팩트체크</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .neo-button:active { transform: translate(2px, 2px); box-shadow: none; }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-900">
    <div id="app">
        <!-- 상단 네비게이션 -->
        <nav class="bg-white border-b-2 border-black sticky top-0 z-30 h-20 flex items-center px-6">
            <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
                <div class="flex items-center cursor-pointer" onclick="location.reload()">
                    <div class="bg-red-600 text-white p-2 mr-3 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <i class="fas fa-balance-scale fa-lg"></i>
                    </div>
                    <span class="font-black text-2xl tracking-tighter uppercase italic">12.3 Voice Archive</span>
                </div>
                <button id="adminNavBtn" onclick="toggleAdminView()" class="text-xs font-black uppercase border-2 border-black px-4 py-2 hover:bg-black hover:text-white transition-all">
                    Admin Login
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-6 py-12">
            <!-- 메인 화면 -->
            <div id="homeView" class="space-y-16">
                <div class="max-w-3xl space-y-6">
                    <h1 class="text-5xl md:text-6xl font-black leading-[1.1] break-keep">
                        현장의 <span class="text-red-600">거짓</span>을 <br>우리의 <span class="underline decoration-8 underline-offset-4">논리</span>로 기록합니다.
                    </h1>
                    <p class="text-lg text-slate-600 font-medium">현재 <span id="recordCount" class="font-black text-black">0</span>개의 시민 기록이 보호받고 있습니다.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-5 gap-12">
                    <!-- 제보 양식 -->
                    <div class="lg:col-span-3 bg-white border-4 border-black p-8 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] space-y-8">
                        <h2 class="text-2xl font-black flex items-center italic border-b-2 pb-4">
                            <i class="fas fa-bolt mr-2 text-yellow-500"></i> 실시간 제보
                        </h2>
                        <div class="space-y-6">
                            <textarea id="propagandaInput" placeholder="목격한 선동 논리" class="w-full border-2 border-slate-200 p-4 h-24 focus:border-black outline-none font-bold bg-orange-50/30"></textarea>
                            <textarea id="refuteInput" placeholder="시민의 헌법적 반박" class="w-full border-2 border-slate-200 p-4 h-40 focus:border-black outline-none font-medium"></textarea>
                            <div class="grid grid-cols-2 gap-4">
                                <input id="authorInput" placeholder="닉네임" class="border-2 border-black p-4 font-bold outline-none">
                                <button onclick="handleDataSubmit()" class="neo-button bg-red-600 text-white font-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-none transition-all">전송하기</button>
                            </div>
                        </div>
                    </div>

                    <!-- 퀴즈 섹션 -->
                    <div class="lg:col-span-2">
                        <div class="bg-slate-900 text-white p-8 border-t-8 border-red-600 shadow-[8px_8px_0px_0px_rgba(0,0,0,0.1)]">
                            <h3 class="text-xl font-black italic mb-6 border-b border-white/20 pb-4">팩트 체크 퀴즈</h3>
                            <div id="quizBox" class="space-y-4">
                                <p id="quizQuestion" class="font-bold text-slate-200">데이터 로딩 중...</p>
                                <div id="quizOptions" class="space-y-2"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 피드 목록 -->
                <div class="space-y-8 pt-8 border-t-4 border-black">
                    <h2 class="text-3xl font-black uppercase italic">Live Feed</h2>
                    <div id="feedList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- 데이터가 여기에 렌더링됩니다 -->
                    </div>
                </div>
            </div>

            <!-- 관리자 로그인 -->
            <div id="adminLoginView" class="hidden max-w-md mx-auto mt-20 p-12 bg-white border-4 border-black shadow-[16px_16px_0px_0px_rgba(0,0,0,1)] text-center">
                <i class="fas fa-user-shield fa-4x mb-6"></i>
                <h2 class="text-3xl font-black uppercase italic mb-8">Admin Access</h2>
                <div class="space-y-6">
                    <input type="password" id="adminPassword" placeholder="Passcode" class="w-full border-2 border-black p-4 text-center font-mono text-xl outline-none">
                    <button onclick="attemptLogin()" class="w-full bg-black text-white py-5 font-black text-xl uppercase hover:bg-red-600 transition-all">Confirm</button>
                    <button onclick="showView('home')" class="text-slate-400 font-bold uppercase text-xs mt-4 block mx-auto">Cancel</button>
                </div>
            </div>

            <!-- 관리자 대시보드 -->
            <div id="adminDashboardView" class="hidden space-y-12">
                <h2 class="text-4xl font-black uppercase italic border-b-4 border-black pb-8">Manage Records</h2>
                <div id="adminRecordList" class="grid grid-cols-1 gap-6"></div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, updateDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD97TrV1AUhfbrqyrl7z2EEtCzMSNke8mA",
            authDomain: "factcheck-archive.firebaseapp.com",
            projectId: "123-factcheck-archive",
            storageBucket: "123-factcheck-archive.firebasestorage.app",
            messagingSenderId: "730619394885",
            appId: "1:730619394885:web:09651d598ce29095749c2c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = '123-factcheck-archive';

        let user = null;
        let records = [];

        // 익명 인증
        signInAnonymously(auth).then(res => user = res.user);

        // 뷰 전환 함수
        window.showView = (viewName) => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('adminLoginView').classList.add('hidden');
            document.getElementById('adminDashboardView').classList.add('hidden');
            document.getElementById(viewName + 'View').classList.remove('hidden');
            
            const btn = document.getElementById('adminNavBtn');
            btn.innerText = (viewName === 'adminDashboard') ? "Exit Admin" : "Admin Login";
        };

        window.toggleAdminView = () => {
            const isDash = !document.getElementById('adminDashboardView').classList.contains('hidden');
            showView(isDash ? 'home' : 'adminLogin');
        };

        // 데이터 실시간 감시
        const refutesCol = collection(db, 'artifacts', appId, 'public', 'data', 'refutes');
        onSnapshot(query(refutesCol), (snapshot) => {
            records = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
            updateUI();
        });

        // 데이터 전송
        window.handleDataSubmit = async () => {
            const propaganda = document.getElementById('propagandaInput').value;
            const refute = document.getElementById('refuteInput').value;
            const author = document.getElementById('authorInput').value;

            if(!propaganda || !refute || !author) {
                alert("내용을 입력해주세요!");
                return;
            }

            try {
                await addDoc(refutesCol, {
                    author, propaganda, refute,
                    status: '검토 중',
                    createdAt: serverTimestamp(),
                    userId: user.uid
                });
                document.getElementById('propagandaInput').value = "";
                document.getElementById('refuteInput').value = "";
                document.getElementById('authorInput').value = "";
                alert("성공적으로 기록되었습니다!");
            } catch(e) { alert("전송 실패"); }
        };

        // 관리자 로그인
        window.attemptLogin = async () => {
            const inputPw = document.getElementById('adminPassword').value;
            const configDocRef = doc(db, 'artifacts', appId, 'public', 'settings', 'admin');
            const snap = await getDoc(configRef);
            const masterPw = snap.exists() ? snap.data().password : "!factcheck123";

            if(inputPw === masterPw) {
                showView('adminDashboard');
            } else {
                alert("접근 권한이 없습니다.");
            }
        };

        // 상태 업데이트 (승인/보류)
        window.updateRecordStatus = async (id, status) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'refutes', id), { status });
        };

        // UI 업데이트 로직
        function updateUI() {
            document.getElementById('recordCount').innerText = records.length;
            
            const feed = document.getElementById('feedList');
            feed.innerHTML = records.map(r => `
                <div class="bg-white border-2 border-black p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-bold text-slate-400">${r.createdAt?.toDate().toLocaleString() || '로딩 중'}</span>
                        <span class="text-[10px] font-black uppercase text-red-600 border border-red-600 px-2">${r.status}</span>
                    </div>
                    <p class="font-bold text-lg mb-3 italic">"${r.propaganda}"</p>
                    <p class="text-sm text-slate-600 mb-4">${r.refute}</p>
                    <p class="text-[10px] font-black text-right border-t pt-2 uppercase">— BY ${r.author}</p>
                </div>
            `).join('');

            const adminList = document.getElementById('adminRecordList');
            adminList.innerHTML = records.map(r => `
                <div class="bg-white border-2 border-black p-6 flex flex-col md:flex-row justify-between gap-6">
                    <div class="flex-1">
                        <h4 class="font-black text-xl mb-2">${r.author} <span class="text-xs font-normal text-slate-400">(${r.status})</span></h4>
                        <p class="text-sm font-bold bg-orange-50 p-2 mb-2">선동: ${r.propaganda}</p>
                        <p class="text-sm bg-blue-50 p-2">반박: ${r.refute}</p>
                    </div>
                    <div class="flex flex-row md:flex-col gap-2 justify-center">
                        <button onclick="updateRecordStatus('${r.id}', '승인')" class="bg-black text-white px-6 py-2 font-bold text-xs">승인</button>
                        <button onclick="updateRecordStatus('${r.id}', '보류')" class="bg-red-600 text-white px-6 py-2 font-bold text-xs">보류</button>
                    </div>
                </div>
            `).join('');
        }

        // 퀴즈 초기화
        const quizData = {
            q: "비상계엄 선포 시 국회의 해제 요구권은?",
            a: ["대통령이 거부할 수 있다", "국회 과반 찬성 시 즉시 해제해야 한다", "군사령관이 결정한다"],
            correct: 1
        };
        document.getElementById('quizQuestion').innerText = quizData.q;
        document.getElementById('quizOptions').innerHTML = quizData.a.map((opt, i) => `
            <button onclick="checkQuiz(${i})" class="w-full text-left p-3 border border-white/20 hover:bg-white/10 text-sm transition-all">${opt}</button>
        `).join('');

        window.checkQuiz = (idx) => {
            if(idx === quizData.correct) alert("정답입니다! 헌법 제77조 제5항에 명시되어 있습니다.");
            else alert("다시 생각해보세요.");
        };
    </script>
</body>
</html>
